[tox]
envlist = py36,py37,py38,py39,py310,py311,py312,lint,type

[testenv]
deps =
    pytest>=6.0
    pytest-cov>=2.12.0
commands =
    pytest {posargs:tests}

[testenv:lint]
basepython = python3.10
deps =
    flake8>=3.9.0
    black>=21.0
commands =
    black --check sql_injection_scanner tests
    flake8 sql_injection_scanner tests

[testenv:format]
basepython = python3.10
deps =
    black>=21.0
commands =
    black sql_injection_scanner tests

[testenv:type]
basepython = python3.10
deps =
    mypy>=0.910
commands =
    mypy sql_injection_scanner

[testenv:coverage]
basepython = python3.10
deps =
    pytest>=6.0
    pytest-cov>=2.12.0
commands =
    pytest --cov=sql_injection_scanner --cov-report=html --cov-report=term tests

[flake8]
max-line-length = 100
extend-ignore = E203,W503
exclude = .git,__pycache__,docs,build,dist,.venv,.eggs,*.egg-info

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers -v
